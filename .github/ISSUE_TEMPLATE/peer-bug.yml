name: "🐛 Peer feedback — Bug"
description: "You tested another team's app and something broke."
title: "[peer/bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Peer feedback from testing another team's app. **One bug per issue, be concrete.**
        Already reported? 👍 react to that issue instead of filing a duplicate.
  - type: input
    id: where
    attributes:
      label: Where / how you tested
      description: Live URL, local run, and which screen or feature.
      placeholder: "e.g. live URL → /login screen"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters (optional)
      placeholder: "Blocks signup / confusing / data loss / etc."
    validations:
      required: false
